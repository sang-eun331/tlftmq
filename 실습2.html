<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자동차 장애물 피하기 실습</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
        }

        .info-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            z-index: 100;
        }

        #car {
            position: absolute;
            width: 50px;
            height: 30px;
            background-color: #e74c3c;
            border-radius: 6px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
            z-index: 10;
        }

        #car::before,
        #car::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 6px;
            background: #333;
        }

        #car::before {
            top: -5px;
            left: 8px;
            box-shadow: 24px 0 #333;
        }

        #car::after {
            bottom: -5px;
            left: 8px;
            box-shadow: 24px 0 #333;
        }

        .obstacle {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            border-radius: 8px;
        }

        .tree {
            background-color: #2ecc71;
            border: 3px solid #27ae60;
        }

        .building {
            background-color: #95a5a6;
            border: 3px solid #7f8c8d;
        }
    </style>

    <script>
        var x = 10, y = 10;

        window.onload = function () {

            resetCar();

            window.onkeydown = function (e) {
                if ([37, 38, 39, 40].indexOf(e.keyCode) > -1) {
                    e.preventDefault();
                }

                switch (e.keyCode) {
                    case 37: x -= 15; break;
                    case 38: y -= 15; break;
                    case 39: x += 15; break;
                    case 40: y += 15; break;
                }

                var car = document.getElementById("car");
                car.style.left = x + "px";
                car.style.top = y + "px";

                checkCollision();
            };
        };

        function resetCar() {
            x = 10;
            y = 10;
            var car = document.getElementById("car");
            car.style.left = x + "px";
            car.style.top = y + "px";
        }

        function checkCollision() {
            var car = document.getElementById("car");
            var obstacles = document.getElementsByClassName("obstacle");

            var carRect = car.getBoundingClientRect();

            for (var i = 0; i < obstacles.length; i++) {
                var obsRect = obstacles[i].getBoundingClientRect();

                if (carRect.left < obsRect.right &&
                    carRect.right > obsRect.left &&
                    carRect.top < obsRect.bottom &&
                    carRect.bottom > obsRect.top) {

                    alert("💥 장애물에 부딪혔습니다! 다시 출발하세요!");
                    resetCar();
                    break;
                }
            }
        }
    </script>
</head>

<body>

    <div class="info-panel">
        <strong>조작법:</strong> 키보드 방향키 (◀ ▲ ▶ ▼)
    </div>

    <div id="car">🚗</div>

    <div class="obstacle tree" style="left: 200px; top: 50px; width: 80px; height: 80px;">🌳</div>

    <div class="obstacle building" style="left: 150px; top: 250px; width: 120px; height: 150px;">🏢</div>

    <div class="obstacle tree" style="left: 450px; top: 180px; width: 90px; height: 90px;">🌳</div>

    <div class="obstacle building" style="left: 380px; top: 400px; width: 160px; height: 120px;">🏢</div>

</body>

</html>
