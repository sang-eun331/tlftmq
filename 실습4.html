<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - 식사 랜덤 뽑기</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background: #fcfbfa;
            color: #333333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        main {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        section {
            background: #ffffff;
            border: 1px solid #f0eae4;
            border-radius: 24px;
            padding: 45px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(218, 198, 183, 0.25);
        }

        h1 {
            font-size: 3rem;
            margin: 20px 0;
            color: #e05a47;
            text-shadow: 0 2px 4px rgba(224, 90, 71, 0.1);
            font-weight: 800;
            letter-spacing: -1px;
        }

        h3 {
            font-size: 1.25rem;
            color: #5a524e;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .item-list {
            color: #7d726c;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: keep-all;
            background: #f7f3ee;
            padding: 14px;
            border-radius: 14px;
            margin: 12px 0;
            border: 1px dashed #eadecf;
        }

        p {
            color: #8c817a;
            font-size: 0.95rem;
            margin: 8px 0;
        }

        hr {
            border: none;
            border-top: 1px solid #f0eae4;
            margin: 25px 0;
        }

        footer {
            margin-top: 25px;
            color: #b3a8a1;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>

    <main>
        <section>
            <script>
                let defaultList = "짜장면, 짬뽕, 제육볶음, 돈까스, 초밥, 햄버거, 김치찌개, 파스타";
                let inputString = prompt("추천받을 후보 항목들을 콤마(,)로 구분해서 입력해줘!", defaultList);

                if (!inputString) {
                    document.write("<h3>뽑기를 취소했습니다.</h3>");
                    document.write("<p>새로고침(F5)을 눌러 다시 시도하세요.</p>");
                } else {
                    let items = inputString.split(',');
                    let index = Math.floor(Math.random() * items.length);
                    let rawChoice = items[index];
                    let choice = rawChoice.trim();

                    document.write("<h3>오늘의 메뉴 후보 (총 " + items.length + "개)</h3>");
                    document.write("<div class='item-list'>" + inputString + "</div>");

                    document.write("<hr>");

                    document.write("<h3>오늘 가장 맛있는 선택은?</h3>");
                    document.write("<h1>🍴 " + choice + " </h1>");

                    document.write("<p style='font-size:0.85rem; color:#b3a8a1;'><i>결과가 아쉽다면 새로고침(F5)을 눌러 다시 뽑아보세요!</i></p>");
                }
            </script>
        </section>
    </main>

    <footer>
        <small>&copy; <span id="year"></span>박상은</small>
    </footer>

    <script src="script.js"></script>
</body>

</html>
