<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 치킨 주문</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .order-container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #e67e22;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 10px;
            border-left: 4px solid #e67e22;
            padding-left: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .menu-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
        }

        .menu-check {
            width: 18px;
            height: 18px;
            accent-color: #e67e22;
        }

        .menu-qty {
            width: 50px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .address-input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .total-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #333;
            font-size: 18px;
            font-weight: bold;
        }

        .total-price {
            border: none;
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
            width: 120px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background-color: #d35400;
        }
    </style>
</head>

<body>

    <div class="order-container">
        <h2>🍗 맛있는 치킨 주문</h2>

        <form onsubmit="return validate(event)">

            <div class="section-title">배달 주소</div>
            <input type="text" id="address" class="address-input" placeholder="배달받으실 주소를 입력해주세요" required>

            <div class="section-title">메뉴 선택</div>

            <div class="menu-item">
                <label class="menu-info">
                    <input type="checkbox" class="menu-check" value="19000" onchange="recalc()">
                    <span>후라이드 치킨 (19,000원)</span>
                </label>
                <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()">
            </div>

            <div class="menu-item">
                <label class="menu-info">
                    <input type="checkbox" class="menu-check" value="20000" onchange="recalc()">
                    <span>양념 치킨 (20,000원)</span>
                </label>
                <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()">
            </div>

            <div class="menu-item">
                <label class="menu-info">
                    <input type="checkbox" class="menu-check" value="500" onchange="recalc()">
                    <span>치킨무 추가 (500원)</span>
                </label>
                <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()">
            </div>

            <div class="menu-item">
                <label class="menu-info">
                    <input type="checkbox" class="menu-check" value="2500" onchange="recalc()">
                    <span>콜라 1.25L (2,500원)</span>
                </label>
                <input type="number" class="menu-qty" value="1" min="1" onchange="recalc()">
            </div>

            <div class="total-container">
                <span>총 결제 금액:</span>
                <div>
                    <input type="text" id="total" class="total-price" value="0" readonly>원
                </div>
            </div>

            <button type="submit" class="submit-btn">주문하기</button>
        </form>
    </div>

    <script>
        function recalc() {
            var total = 0;
            var checks = document.getElementsByClassName("menu-check");
            var qtys = document.getElementsByClassName("menu-qty");

            for (var i = 0; i < checks.length; i++) {
                if (checks[i].checked) { 
                    var price = parseInt(checks[i].value);
                    var quantity = parseInt(qtys[i].value);
                    total += price * quantity;
                }
            }
            document.getElementById("total").value = total;
        }

        function validate(e) {
            var total = parseInt(document.getElementById("total").value);
            var address = document.getElementById("address").value;

            if (total == 0) {
                alert("메뉴를 선택해주세요.");
            } else {
                alert("🎉 주문이 완료되었습니다!\n\n📍 배달 주소: " + address + "\n💵 총 결제 금액: " + total.toLocaleString() + "원");
            }

            e.preventDefault(); 
            return false;
        }
    </script>

</body>

</html>
