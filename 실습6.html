<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>댓글 추가/삭제</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #fff5f5;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        h2 {
            text-align: center;
            color: #ff6b6b;
            margin-top: 20px;
        }

        .comment-bubble {
            position: absolute;
            background: #fff;
            padding: 20px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s infinite alternate ease-in-out;
            font-weight: bold;
            color: #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .del-btn {
            background: #ffeded;
            color: #ff6b6b;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        @keyframes float {
            from {
                transform: translateY(0px);
            }

            to {
                transform: translateY(-20px);
            }
        }

        .focused {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1.5) !important;
            z-index: 100;
            background: #ffeb3b !important;
            box-shadow: 0 0 30px #ffeb3b !important;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }

        button.add-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border-radius: 30px;
            border: none;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>댓글을 추가하고 클릭해보세요!</h2>
    <button class="add-btn" onclick="addComment()">+ 새로운 댓글 추가</button>

    <script>
        function addComment() {
            var inputStr = prompt("댓글을 입력하세요:");
            if (!inputStr || inputStr.trim() === "") return;

            var div = document.createElement("div");
            div.className = "comment-bubble";

            var span = document.createElement("span");
            span.textContent = inputStr;
            div.appendChild(span);

            var delBtn = document.createElement("button");
            delBtn.innerHTML = "×";
            delBtn.className = "del-btn";
            delBtn.onclick = function (e) {
                e.stopPropagation();
                div.remove();
            };
            div.appendChild(delBtn);

            div.style.left = Math.random() * 70 + 10 + "%";
            div.style.top = Math.random() * 50 + 10 + "%";

            div.onclick = function () {
                this.classList.toggle("focused");
            };

            document.body.appendChild(div);
        }
    </script>
</body>

</html>
